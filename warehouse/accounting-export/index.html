<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMKOM - Hakediş ve Boya Düşüşleri</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="accounting-export.css">
    <link rel="stylesheet" href="../../components/navbar.css">
    <link rel="stylesheet" href="../../components/header/header.css">
    <link rel="stylesheet" href="../../components/table/table.css">
    <link rel="stylesheet" href="../../components/timerWidget.css">
    <link rel="icon" type="image/png" href="../../images/gemkom.png">
</head>
<body>
    <!-- Navigation -->
    <div id="navbar-container"></div>

    <!-- Main Content -->
    <div class="main-layout">
        <div class="content-area">
            <div class="container">
                <div class="main-container">
                    <!-- Header Component Placeholder -->
                    <div id="header-placeholder"></div>

                    <!-- Controls -->
                    <div class="dashboard-card mb-3">
                        <div class="card-body">
                            <form id="accounting-export-form" class="row g-3 align-items-end">
                                <div class="col-12 col-md-3">
                                    <label for="year-input" class="form-label">Yıl</label>
                                    <input id="year-input" class="form-control" type="number" min="2000" max="2100" required />
                                </div>
                                <div class="col-12 col-md-4">
                                    <label for="month-select" class="form-label">Ay</label>
                                    <select id="month-select" class="form-select" required></select>
                                </div>
                                <div class="col-12 col-md-5 d-flex gap-2 justify-content-md-end">
                                    <button id="fetch-btn" type="submit" class="btn btn-primary">
                                        <i class="fas fa-search me-1"></i>Getir
                                    </button>
                                    <button id="export-btn" type="button" class="btn btn-success" onclick="window.doExcelExport()">
                                        <i class="fas fa-file-excel me-1"></i>Excel Dışa Aktar
                                    </button>
                                </div>
                                <div class="col-12">
                                    <div id="status" class="small text-muted"></div>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Results -->
                    <div id="results-container"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SheetJS (style-capable fork) for Excel export with font/size support -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style/dist/xlsx.bundle.js"></script>
    <script type="module" src="accounting-export.js"></script>
    <!-- Timer Widget -->
    <script type="module" src="../../components/timerWidgetInit.js"></script>
</body>
</html>
